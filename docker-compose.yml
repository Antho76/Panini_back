services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: panini
      POSTGRES_USER: panini
      POSTGRES_PASSWORD: panini
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  back:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/panini
      SPRING_DATASOURCE_USERNAME: panini
      SPRING_DATASOURCE_PASSWORD: panini
      JWT_SECRET: change-me-change-me-change-me-change-me
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      - db
volumes:
  pgdata:
