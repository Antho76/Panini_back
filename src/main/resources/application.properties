spring.application.name=panini-back
server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:paninidb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never
app.jwt.secret=${JWT_SECRET:panini-secret-panini-secret-panini-secret}
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}
 